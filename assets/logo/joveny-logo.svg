<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 50">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E6A3"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Brand name -->
  <text x="0" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" letter-spacing="3" fill="url(#gold)">JOVENY</text>
  <text x="148" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" font-style="italic" letter-spacing="2" fill="#FFFFFF">Models</text>
  <!-- Decorative line -->
  <line x1="0" y1="42" x2="100" y2="42" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="106" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="500" letter-spacing="3.5" fill="#888888" text-transform="uppercase">ACADEMY</text>
</svg>
