<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#F5E6A3"/>
      <stop offset="70%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- JEA Monogram — stacked/overlapping serif letters -->
  <g transform="translate(0, 2)">
    <!-- J — large, with decorative descender -->
    <text x="0" y="52" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="62" font-weight="700" fill="url(#gold)" letter-spacing="-2">J</text>
    <!-- E — overlapping with J, slightly smaller -->
    <text x="28" y="48" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="46" font-weight="600" fill="url(#gold)" letter-spacing="-1" opacity="0.9">E</text>
    <!-- A — smallest, tucked into E -->
    <text x="52" y="52" font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" font-size="30" font-weight="500" fill="url(#gold)" letter-spacing="0" opacity="0.85">A</text>
  </g>

  <!-- Brand name text -->
  <text x="92" y="32" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="#FFFFFF">JOVENY MODELS</text>

  <!-- Decorative thin line -->
  <line x1="92" y1="40" x2="242" y2="40" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>

  <!-- Academy subtitle -->
  <text x="92" y="52" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif" font-size="7.5" font-weight="400" letter-spacing="5.5" fill="#888888">ACADEMY</text>
</svg>
